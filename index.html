<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layered Date Stack</title>
    <style>
      :root {
        --bg: #e8e8ea;
        --blue: #1677ff;
        --black: #0a0a0a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        font-family: "Arial Narrow", "Helvetica Neue", Arial, sans-serif;
      }

      .stage {
        position: relative;
        width: min(88vw, 760px);
        aspect-ratio: 4 / 3;
        perspective: 820px;
        transform: scale(0.92) translateZ(0);
      }

      .cloud {
        position: absolute;
        inset: 0;
        transform-style: preserve-3d;
        filter: drop-shadow(0 18px 14px rgba(0, 0, 0, 0.2));
        will-change: transform, filter;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }

      .card {
        position: absolute;
        left: 50%;
        top: 50%;
        translate: -50% -50%;
        width: clamp(220px, 45vw, 430px);
        height: clamp(72px, 12vw, 120px);
        border-radius: 2px;
        transform-style: preserve-3d;
        transform-origin: center center;
        display: grid;
        place-items: center;
        overflow: hidden;
        will-change: transform, box-shadow;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        contain: paint;
        box-shadow:
          0 10px 20px -8px rgba(0, 0, 0, 0.24),
          0 4px 10px rgba(0, 0, 0, 0.14);
      }

      .card span {
        display: block;
        width: 100%;
        text-align: center;
        font-weight: 500;
        letter-spacing: 0.01em;
        font-size: clamp(64px, 11vw, 98px);
        line-height: 0.82;
        transform: translateY(9%);
        user-select: none;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }

      .card.black {
        background: var(--black);
      }

      .card.black span {
        color: #f7f7f7;
      }

      .card.blue {
        background: var(--blue);
      }

      .card.blue span {
        color: #0f1630;
      }

      .card.center {
        z-index: 200;
      }

    </style>
  </head>
  <body>
    <div class="stage">
      <div class="cloud" id="cloud"></div>
    </div>

    <script>
      const cloud = document.getElementById("cloud");
      const label = "01.20.25";
      const cards = [];

      function easeInOutSine(t) {
        return -(Math.cos(Math.PI * t) - 1) / 2;
      }

      function createCard(kind, baseAngle, index, count) {
        const el = document.createElement("div");
        el.className = `card ${kind}`;
        el.innerHTML = `<span>${label}</span>`;
        cloud.appendChild(el);

        const n = index / (count - 1);
        cards.push({
          el,
          kind,
          baseAngle,
          band: n,
          depthBias: (0.5 - n) * 16
        });
      }

      // Arc/spiral arrangement inspired by the reference image.
      const cardCount = 24;
      const arcStart = -0.15 * Math.PI;
      const arcSweep = 1.7 * Math.PI;
      for (let i = 0; i < cardCount; i++) {
        const a = arcStart + (i / (cardCount - 1)) * arcSweep;
        createCard(i % 4 === 0 ? "black" : "blue", a, i, cardCount);
      }
      cards[Math.floor(cardCount * 0.52)].el.classList.add("center");

      const start = performance.now();
      function tick() {
        const t = (performance.now() - start) / 1000;

        const tiltX = 7 + Math.sin(t * 1.35) * 4.2;
        const tiltY = -5 + Math.cos(t * 1.1) * 7.6;
        const tiltZ = Math.sin(t * 0.95) * 3.5;
        cloud.style.transform =
          `rotateX(${tiltX}deg) rotateY(${tiltY}deg) rotateZ(${tiltZ}deg) translateY(${
            Math.sin(t * 2.1) * -9
          }px)`;

        const hue = 214 + Math.sin(t * 2.1) * 28;
        const sat = 86 + (Math.sin(t * 2.6 + 1.4) + 1) * 7;
        const light = 38 + (Math.sin(t * 3.1 + 0.7) + 1) * 13;
        document.documentElement.style.setProperty(
          "--blue",
          `hsl(${hue.toFixed(1)} ${sat.toFixed(1)}% ${light.toFixed(1)}%)`
        );

        for (let i = 0; i < cards.length; i++) {
          const c = cards[i];

          // Smoothly varying arc offsets (eased, continuous).
          const phase = (Math.sin(t * 1.9 + i * 0.22) + 1) * 0.5;
          const eased = easeInOutSine(phase);
          const arcOffset = (eased - 0.5) * 1.25;

          // Circular motion specifically in Y/Z to create orbiting arc paths.
          const yzAngle = c.baseAngle + t * 2.05 + arcOffset;
          const radiusY = 154 + Math.sin(t * 1.6 + i * 0.27) * 34;
          const radiusZ = 236 + Math.cos(t * 1.75 + i * 0.19) * 58;
          const y = Math.sin(yzAngle) * radiusY;
          const z = Math.cos(yzAngle) * radiusZ + c.depthBias * 2.1 + i * 0.45;

          // Slight X drift keeps a soft 3D helix look.
          const x =
            Math.cos(c.baseAngle + t * 1.05) * 134 +
            Math.sin(t * 3 + i * 0.31) * 20;

          // Dramatic scale breathing, strongest near front-facing cards.
          const front = (Math.cos(yzAngle) + 1) * 0.5;
          const pulse = easeInOutSine((Math.sin(t * 4.1 + i * 0.4) + 1) * 0.5);
          const centerBoost = c.el.classList.contains("center") ? 0.26 : 0;
          const scale = 0.38 + front * 0.95 + pulse * 0.24 + centerBoost;

          const yaw = Math.sin(t * 2.4 + i * 0.18) * 8 + Math.cos(yzAngle) * 18;
          const pitch = Math.cos(t * 2.1 + i * 0.24) * 5.5;
          const roll = (c.baseAngle * 180) / Math.PI + Math.sin(t * 1.9 + i * 0.3) * 6;

          c.el.style.transform =
            `translate3d(${x}px, ${y}px, ${z}px) ` +
            `rotateX(${pitch}deg) rotateY(${yaw}deg) rotateZ(${roll}deg) scale(${scale})`;
          const shadowY = 8 + front * 26;
          const shadowBlur = 12 + front * 44;
          const shadowSpread = -10 + front * 4;
          const shadowAlpha = 0.16 + front * 0.22;
          const ambientAlpha = 0.08 + front * 0.1;
          const rimAlpha = c.kind === "blue" ? 0.22 : 0.12;
          c.el.style.boxShadow =
            `0 ${shadowY}px ${shadowBlur}px ${shadowSpread}px rgba(0, 0, 0, ${shadowAlpha}), ` +
            `0 4px 12px rgba(0, 0, 0, ${ambientAlpha}), ` +
            `inset 0 1px 0 rgba(255, 255, 255, ${rimAlpha})`;
        }

        requestAnimationFrame(tick);
      }
      tick();
    </script>
  </body>
</html>
