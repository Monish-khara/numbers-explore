<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layered Date Stack</title>
    <style>
      :root {
        --bg: #e8e8ea;
        --blue: #1677ff;
        --black: #0a0a0a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        font-family: "Arial Narrow", "Helvetica Neue", Arial, sans-serif;
      }

      .stage {
        position: relative;
        width: min(88vw, 760px);
        aspect-ratio: 4 / 3;
        perspective: 1200px;
      }

      .cloud {
        position: absolute;
        inset: 0;
        transform-style: preserve-3d;
        filter: drop-shadow(0 18px 14px rgba(0, 0, 0, 0.2));
        will-change: transform, filter;
      }

      .card {
        position: absolute;
        left: 50%;
        top: 50%;
        translate: -50% -50%;
        width: clamp(220px, 45vw, 430px);
        height: clamp(72px, 12vw, 120px);
        border-radius: 2px;
        transform-style: preserve-3d;
        transform-origin: center center;
        display: grid;
        place-items: center;
        overflow: hidden;
        will-change: transform;
      }

      .card span {
        display: block;
        width: 100%;
        text-align: center;
        font-weight: 500;
        letter-spacing: 0.01em;
        font-size: clamp(64px, 11vw, 98px);
        line-height: 0.82;
        transform: translateY(9%);
        user-select: none;
      }

      .card.black {
        background: var(--black);
      }

      .card.black span {
        color: #f7f7f7;
      }

      .card.blue {
        background: var(--blue);
      }

      .card.blue span {
        color: #0f1630;
      }

      .card.center {
        z-index: 200;
      }

    </style>
  </head>
  <body>
    <div class="stage">
      <div class="cloud" id="cloud"></div>
    </div>

    <script>
      const cloud = document.getElementById("cloud");
      const label = "01.20.25";
      const cards = [];

      function createCard(kind, x, y, z, scale, extraRotate = 0, lane = 0) {
        const el = document.createElement("div");
        el.className = `card ${kind}`;
        el.innerHTML = `<span>${label}</span>`;
        el.style.transform = `translate3d(${x}px, ${y}px, ${z}px) rotateZ(${extraRotate}deg) scale(${scale})`;
        cloud.appendChild(el);
        cards.push({ el, x, y, z, scale, extraRotate, lane });
      }

      // Back black fan
      for (let i = -8; i <= 8; i++) {
        const a = i / 8;
        createCard(
          "black",
          Math.sin(a * Math.PI) * 115,
          a * 145,
          -Math.abs(i) * 6,
          0.93 - Math.abs(i) * 0.012,
          a * 4,
          0
        );
      }

      // Side blue fan
      for (let i = -6; i <= 6; i++) {
        const a = i / 6;
        createCard(
          "blue",
          135 + Math.cos(a * Math.PI) * 22,
          a * 120,
          14 - Math.abs(i) * 2.2,
          0.84 - Math.abs(i) * 0.016,
          -8 + a * 6,
          1
        );
      }

      // Center hero card
      createCard("blue", 70, 0, 80, 1.06, -2, 2);
      cards[cards.length - 1].el.classList.add("center");

      // Tiny blue top/bottom accent cards
      createCard("blue", -48, -170, -2, 0.32, 1, 3);
      createCard("blue", -40, 165, -2, 0.32, -1, 3);

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      function fract(v) {
        return v - Math.floor(v);
      }

      function hash(seed) {
        return fract(Math.sin(seed * 12.9898 + 78.233) * 43758.5453123);
      }

      function pulseWave(time, speed = 0.85) {
        const p = (Math.sin(time * speed) + 1) * 0.5;
        return p * p * (3 - 2 * p);
      }

      function randomState(card, cycle, index) {
        const chaos = 8 + card.lane * 8;
        const h1 = hash(cycle * 23.1 + index * 3.17);
        const h2 = hash(cycle * 31.7 + index * 5.41);
        const h3 = hash(cycle * 41.3 + index * 7.93);
        const h4 = hash(cycle * 53.9 + index * 11.09);
        const h5 = hash(cycle * 67.1 + index * 13.37);
        const h6 = hash(cycle * 73.7 + index * 17.21);
        return {
          ox: (h1 * 2 - 1) * chaos * 1.4,
          oy: (h2 * 2 - 1) * chaos * 1.1,
          oz: (h3 * 2 - 1) * (16 + card.lane * 8),
          rx: (h4 * 2 - 1) * (3.2 + card.lane * 1.1),
          ry: (h5 * 2 - 1) * (4.4 + card.lane * 1.2),
          sc: 1 + (h6 * 2 - 1) * 0.06
        };
      }

      let cycleIndex = -1;
      const prevState = cards.map((c, i) => randomState(c, 0, i));
      const nextState = cards.map((c, i) => randomState(c, 1, i));

      const start = performance.now();
      function tick() {
        const t = (performance.now() - start) / 1000;
        const pulse = pulseWave(t, 1.25);
        const swirl = (Math.sin(t * 1.25) + 1) * 0.5;
        const burst = Math.max(0, Math.sin(t * 3.4 - 0.4)) ** 3;

        const cycleDuration = 0.95;
        const c = Math.floor(t / cycleDuration);
        const progress = (t % cycleDuration) / cycleDuration;
        const eased = easeInOutCubic(progress);

        if (c !== cycleIndex) {
          cycleIndex = c;
          for (let i = 0; i < cards.length; i++) {
            prevState[i] = nextState[i];
            nextState[i] = randomState(cards[i], c + 2, i);
          }
        }

        const tiltX = 7 + Math.sin(t * 1.8) * 7.2 + Math.sin(t * 4.1) * 1.8 + pulse * 2.8;
        const tiltY = -6 + Math.cos(t * 1.65) * 9.6 + Math.sin(t * 3.4) * 2.2;
        const tiltZ = Math.sin(t * 1.15) * 4.8;
        cloud.style.transform =
          `rotateX(${tiltX}deg) rotateY(${tiltY}deg) rotateZ(${tiltZ}deg) ` +
          `translateY(${Math.sin(t * 2.1) * -12}px)`;

        const hue = 212 + Math.sin(t * 0.5) * 8 + burst * 4;
        document.documentElement.style.setProperty(
          "--blue",
          `hsl(${hue.toFixed(1)} 95% 54%)`
        );

        for (let i = 0; i < cards.length; i++) {
          const c = cards[i];
          const a = prevState[i];
          const b = nextState[i];
          const randX = lerp(a.ox, b.ox, eased);
          const randY = lerp(a.oy, b.oy, eased);
          const randZ = lerp(a.oz, b.oz, eased);
          const randRX = lerp(a.rx, b.rx, eased);
          const randRY = lerp(a.ry, b.ry, eased);
          const randScale = lerp(a.sc, b.sc, eased);

          const laneOffset = c.lane * 0.7;
          const spin = t * (2.2 + c.lane * 0.34) + i * 0.22;
          const orbitX = Math.cos(spin + laneOffset) * (8 + c.lane * 4);
          const yzAngle = t * (2.9 + c.lane * 0.45) + i * 0.33 + laneOffset;
          const yzRadiusY = (22 + c.lane * 16) * (0.55 + swirl * 0.75);
          const yzRadiusZ = (28 + c.lane * 22) * (0.45 + swirl * 0.95);
          const circleY = Math.cos(yzAngle) * yzRadiusY;
          const circleZ = Math.sin(yzAngle) * yzRadiusZ;
          const jitter = Math.sin(t * 9.2 + i * 0.26) * (4.2 + c.lane * 1.4);
          const depthBreath = Math.sin(t * 4.6 + i * 0.17) * 12;
          const pulseBoost = c.el.classList.contains("center") ? 34 : 14;
          const z =
            c.z +
            circleZ +
            depthBreath +
            pulse * pulseBoost +
            burst * (c.lane * 9.2) +
            randZ;
          const yaw = Math.sin(t * 3.1 + i * 0.14) * (4.2 + c.lane * 1.2) + randRY;
          const pitch = Math.cos(t * 2.6 + i * 0.19) * (2.1 + c.lane * 0.6) + randRX;
          const scaleBeat = easeInOutCubic((Math.sin(t * 2.8 + i * 0.21) + 1) * 0.5);
          const scaleBurst = Math.max(0, Math.sin(t * 4.5 + i * 0.15)) ** 2;
          const scale =
            c.scale *
            randScale *
            (1 +
              (c.el.classList.contains("center")
                ? 0.18 + pulse * 0.24 + scaleBeat * 0.18 + scaleBurst * 0.26
                : 0.08 + pulse * 0.12 + scaleBeat * 0.1 + scaleBurst * 0.12));

          c.el.style.transform =
            `translate3d(${c.x + orbitX + randX + jitter}px, ${c.y + circleY + randY + jitter * 0.32}px, ${z}px) ` +
            `rotateX(${pitch}deg) rotateY(${yaw}deg) rotateZ(${c.extraRotate}deg) scale(${scale})`;
        }

        requestAnimationFrame(tick);
      }
      tick();
    </script>
  </body>
</html>
