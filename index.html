<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layered Date Stack</title>
    <style>
      :root {
        --bg: #e8e8ea;
        --blue: #1677ff;
        --black: #0a0a0a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        font-family: "Arial Narrow", "Helvetica Neue", Arial, sans-serif;
      }

      .stage {
        position: relative;
        width: min(88vw, 760px);
        aspect-ratio: 4 / 3;
        perspective: 1200px;
      }

      .cloud {
        position: absolute;
        inset: 0;
        transform-style: preserve-3d;
        filter: drop-shadow(0 18px 14px rgba(0, 0, 0, 0.2));
        will-change: transform, filter;
      }

      .card {
        position: absolute;
        left: 50%;
        top: 50%;
        translate: -50% -50%;
        width: clamp(220px, 45vw, 430px);
        height: clamp(72px, 12vw, 120px);
        border-radius: 2px;
        transform-style: preserve-3d;
        transform-origin: center center;
        display: grid;
        place-items: center;
        overflow: hidden;
        will-change: transform;
      }

      .card span {
        display: block;
        width: 100%;
        text-align: center;
        font-weight: 500;
        letter-spacing: 0.01em;
        font-size: clamp(64px, 11vw, 98px);
        line-height: 0.82;
        transform: translateY(9%);
        user-select: none;
      }

      .card.black {
        background: var(--black);
      }

      .card.black span {
        color: #f7f7f7;
      }

      .card.blue {
        background: var(--blue);
      }

      .card.blue span {
        color: #0f1630;
      }

      .card.center {
        z-index: 200;
      }

    </style>
  </head>
  <body>
    <div class="stage">
      <div class="cloud" id="cloud"></div>
    </div>

    <script>
      const cloud = document.getElementById("cloud");
      const label = "01.20.25";
      const cards = [];

      function easeInOutSine(t) {
        return -(Math.cos(Math.PI * t) - 1) / 2;
      }

      function createCard(kind, baseAngle, index, count) {
        const el = document.createElement("div");
        el.className = `card ${kind}`;
        el.innerHTML = `<span>${label}</span>`;
        cloud.appendChild(el);

        const n = index / (count - 1);
        cards.push({
          el,
          baseAngle,
          band: n,
          depthBias: (0.5 - n) * 16
        });
      }

      // Arc/spiral arrangement inspired by the reference image.
      const cardCount = 24;
      const arcStart = -0.15 * Math.PI;
      const arcSweep = 1.7 * Math.PI;
      for (let i = 0; i < cardCount; i++) {
        const a = arcStart + (i / (cardCount - 1)) * arcSweep;
        createCard(i % 4 === 0 ? "black" : "blue", a, i, cardCount);
      }
      cards[Math.floor(cardCount * 0.52)].el.classList.add("center");

      const start = performance.now();
      function tick() {
        const t = (performance.now() - start) / 1000;

        const tiltX = 6 + Math.sin(t * 0.8) * 2.8;
        const tiltY = -4 + Math.cos(t * 0.65) * 5.2;
        const tiltZ = Math.sin(t * 0.52) * 2.4;
        cloud.style.transform =
          `rotateX(${tiltX}deg) rotateY(${tiltY}deg) rotateZ(${tiltZ}deg) translateY(${
            Math.sin(t * 1.35) * -6
          }px)`;

        const hue = 212 + Math.sin(t * 0.45) * 9;
        document.documentElement.style.setProperty("--blue", `hsl(${hue.toFixed(1)} 95% 52%)`);

        for (let i = 0; i < cards.length; i++) {
          const c = cards[i];

          // Smoothly varying arc offsets (eased, continuous).
          const phase = (Math.sin(t * 1.05 + i * 0.22) + 1) * 0.5;
          const eased = easeInOutSine(phase);
          const arcOffset = (eased - 0.5) * 0.9;

          // Circular motion specifically in Y/Z to create orbiting arc paths.
          const yzAngle = c.baseAngle + t * 1.12 + arcOffset;
          const radiusY = 148 + Math.sin(t * 0.9 + i * 0.27) * 26;
          const radiusZ = 178 + Math.cos(t * 1.05 + i * 0.19) * 34;
          const y = Math.sin(yzAngle) * radiusY;
          const z = Math.cos(yzAngle) * radiusZ + c.depthBias;

          // Slight X drift keeps a soft 3D helix look.
          const x =
            Math.cos(c.baseAngle + t * 0.6) * 116 +
            Math.sin(t * 1.8 + i * 0.31) * 14;

          // Dramatic scale breathing, strongest near front-facing cards.
          const front = (Math.cos(yzAngle) + 1) * 0.5;
          const pulse = easeInOutSine((Math.sin(t * 2.7 + i * 0.4) + 1) * 0.5);
          const scale = 0.5 + front * 0.62 + pulse * 0.2;

          const yaw = Math.sin(t * 1.4 + i * 0.18) * 5 + Math.cos(yzAngle) * 12;
          const pitch = Math.cos(t * 1.2 + i * 0.24) * 3;
          const roll = (c.baseAngle * 180) / Math.PI + Math.sin(t * 1.1 + i * 0.3) * 4;

          c.el.style.transform =
            `translate3d(${x}px, ${y}px, ${z}px) ` +
            `rotateX(${pitch}deg) rotateY(${yaw}deg) rotateZ(${roll}deg) scale(${scale})`;
        }

        requestAnimationFrame(tick);
      }
      tick();
    </script>
  </body>
</html>
